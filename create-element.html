<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreateElement</title>
</head>
<body>
    <div id="root"></div>
</body>
<script>
    const root = document.getElementById("root");
    const h1 = document.createElement("h1"); 
    h1.id = "heading";
    h1.className = "class";
    h1.style = "color: red";

    h1.innerText = "Hello world!";

    root.appendChild(h1);
    console.log(h1);
</script>
</html>
