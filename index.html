<!-- 
SPA - Single-Page Application
- ReactJS là 1 trong những thư viện tạo ra SPA
- Các "ông lớn" sử dụng SPA: Google, Facebook, Twitter
- Các SPA khác: F8, Shoppe, chotot

Cách triển khai
- SPA: Single-page Application
- MPA: Multi-page Application

Sự khác biệt
SPA: Single - Page Application
- Được cho là cách tiếp cận hiện tại hơn
- Không yêu cầu tải lại trang trong quá trình sử dụng

MPA: Multi - Page Application
- Là cách tiếp cận cổ điện hơn
- Tải lại trang trong quá trình sử dụng (click vào đường link, chuyển trang, ...)

Demo: Dân trí sẽ là MPA, F8 là SPA

Tốc độ:
- SPA nhanh hơn khi sử dụng
-   Phần lớn tài nguyên được tải trong lần đầu
-   Trang chỉ tải thêm dữ liệu mới khi cần
- MPA chậm hơn khi sử dụng
-   Luôn tải lại toàn bộ trang khi truy cập và chuyển hướng

Bóc tách
- SPA có phần Front-end riêng biệt
- MPA Front-end & Back-end phụ thuộc vào nhau nhiều hơn, được đặt trong cùng 1 dự án

SEO
- SPA không thân thiện với SEO như MPA
- Trải nghiệm trên thiết bị di động tốt hơn

UX
- SPA cho trải nghiệm tốt hơn, nhất là các thao tác chuyển trang
- Trải nghiệm trên thiết bị di động tốt hơn

Quá trình phát triển 
- SPA dễ dàng tái sử dụng code (component)
- SPA bóc tách FE & BE
-       Chia team phát triển song song
-       Phát triển thêm mobile app dễ dàng


Phụ thuộc JS
- SPA phụ thuộc hoàn toàn vào JS
- MPA có thể không cần phụ thuộc JS

Arrow function
1. Let, const  
2. Template Literals 
3. Multi-line String 
4. Arrow function
5. Classes
6. Enhanced object literals
7. Default parameter values
8. Destrucring
9. Rest parameters
10.Tagged template literal
11. Spread
12.Modules

-   Định nghĩa key: value cho object
-   Định nghĩa method cho object
-   Định nghĩa key cho object dưới dạng biến
